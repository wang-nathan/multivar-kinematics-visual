<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TNB Rollercoaster Visualization</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h2>TNB Rollercoaster</h2>
        
        <div id="equation-display">r(t) = &lt;cos(t), sin(t), t&gt;</div>
        
        <div class="control-group">
            <button id="btn-play">Pause Simulation</button>
        </div>

        <div class="control-group">
            <label>Primary Axis
                <select id="select-axis">
                    <option value="z">Z-Axis (Vertical)</option>
                    <option value="y">Y-Axis (Horizontal)</option>
                    <option value="x">X-Axis (Horizontal)</option>
                </select>
            </label>
        </div>

        <div class="control-group">
            <label>Radius (R) <input type="range" id="slider-r" min="1" max="6" step="0.1" value="3"></label>
            <label>Pitch (P) <input type="range" id="slider-p" min="0.2" max="3" step="0.1" value="0.8"></label>
            <label>Speed <input type="range" id="slider-speed" min="0.01" max="0.1" step="0.01" value="0.03"></label>
        </div>

        <div class="control-group">
            <label>Track Style 
                <select id="select-track">
                    <option value="rails">Dual Rails</option>
                    <option value="tube">Solid Tube</option>
                    <option value="line">Simple Line</option>
                </select>
            </label>
            <label>Cart Shape
                <select id="select-cart">
                    <option value="cart">Modern Cart</option>
                    <option value="box">Cube</option>
                    <option value="sphere">Glowing Sphere</option>
                </select>
            </label>
        </div>

        <div class="control-group">
            <label>Scene Theme <input type="color" id="color-bg" value="#1a1a2e"></label>
            <label>Cart Color <input type="color" id="color-cart" value="#00ffcc"></label>
            <label>Track Color <input type="color" id="color-track" value="#aaaaaa"></label>
        </div>

        <div class="control-group">
            <label>Show Tangent (T) <input type="checkbox" id="check-t" checked></label>
            <label>Show Normal (N) <input type="checkbox" id="check-n" checked></label>
            <label>Show Bi-normal (B) <input type="checkbox" id="check-b" checked></label>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 12, 10);
        THREE.Object3D.DefaultUp.set(0, 0, 1); 
        camera.up.set(0, 0, 1);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 10, 20);
        scene.add(directionalLight);

        const cartLight = new THREE.PointLight(0x00ffcc, 2, 15);
        scene.add(cartLight);

        const gridHelper = new THREE.GridHelper(30, 30, 0x555555, 0x222222);
        gridHelper.rotation.x = Math.PI / 2; 
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(8);
        scene.add(axesHelper);

        function createTextSprite(message, color, isLongWord = false) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = isLongWord ? 512 : 256; 
            canvas.height = 256;
            context.font = isLongWord ? "Bold 25px Times New Roman" : "Bold 120px Arial";
            context.fillStyle = color;
            context.textAlign = "center";
            context.fillText(message, canvas.width / 2, 160);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            // Scale width to match aspect ratio
            sprite.scale.set(isLongWord ? 6 : 3, 3, 1); 
            return sprite;
        }

        const spriteX = createTextSprite("X", "#ff5555"); spriteX.position.set(9, 0, 0); scene.add(spriteX);
        const spriteY = createTextSprite("Y", "#55ff55"); spriteY.position.set(0, 9, 0); scene.add(spriteY);
        const spriteZ = createTextSprite("Z", "#5555ff"); spriteZ.position.set(0, 0, 9); scene.add(spriteZ);

        const spriteT = createTextSprite("Tangent", "#ff5555", true); scene.add(spriteT);
        const spriteN = createTextSprite("Normal", "#55ff55", true); scene.add(spriteN);
        const spriteB = createTextSprite("Bi-normal", "#5555ff", true); scene.add(spriteB);

        let R = 3.0; 
        let P = 0.8; 
        let helixAxis = 'z'; 
        const maxT = 8 * Math.PI; 
        
        const trackGroup = new THREE.Group();
        scene.add(trackGroup);
        const trackMaterial = new THREE.LineBasicMaterial({ color: 0xaaaaaa, linewidth: 2 });
        const tubeMaterial = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.6, roughness: 0.2 });

        const cartGroup = new THREE.Group();
        scene.add(cartGroup);

        const primaryCartMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, metalness: 0.8, roughness: 0.1, emissive: 0x004433
        });

        const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.4), primaryCartMaterial);
        chassis.position.z = 0.2; cartGroup.add(chassis);
        const cartSphere = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), primaryCartMaterial);
        cartSphere.position.z = 0.5; cartSphere.visible = false; cartGroup.add(cartSphere);
        const cartBox = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), primaryCartMaterial);
        cartBox.position.z = 0.4; cartBox.visible = false; cartGroup.add(cartBox);

        function createGlowMaterial(color) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            return new THREE.SpriteMaterial({ map: texture, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false });
        }
        let glowSpriteMat = createGlowMaterial('rgba(0, 255, 204, 1)');
        const glowSprite = new THREE.Sprite(glowSpriteMat);
        glowSprite.scale.set(4, 4, 1);
        cartGroup.add(glowSprite);

        const trailMaterial = new THREE.LineBasicMaterial({ color: 0x00ffcc, linewidth: 3, transparent: true, opacity: 0.8 });
        const trailLine = new THREE.Line(new THREE.BufferGeometry(), trailMaterial);
        scene.add(trailLine);

        const arrowLength = 2.5;
        const labelOffset = 2.8; 

        const arrowT = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), arrowLength, 0xff5555, 0.5, 0.3);
        const arrowN = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), arrowLength, 0x55ff55, 0.5, 0.3);
        const arrowB = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), arrowLength, 0x5555ff, 0.5, 0.3);
        scene.add(arrowT); scene.add(arrowN); scene.add(arrowB);

        function getTNB(t) {
            const magV = Math.sqrt(R*R + P*P);
            const cos = Math.cos(t);
            const sin = Math.sin(t);
            let pos, T, N;

            if (helixAxis === 'z') {
                pos = new THREE.Vector3(R * cos, R * sin, P * t);
                T = new THREE.Vector3(-R * sin / magV, R * cos / magV, P / magV);
                N = new THREE.Vector3(-cos, -sin, 0);
            } else if (helixAxis === 'y') {
                pos = new THREE.Vector3(R * cos, P * t, R * sin);
                T = new THREE.Vector3(-R * sin / magV, P / magV, R * cos / magV);
                N = new THREE.Vector3(-cos, 0, -sin);
            } else if (helixAxis === 'x') {
                pos = new THREE.Vector3(P * t, R * cos, R * sin);
                T = new THREE.Vector3(P / magV, -R * sin / magV, R * cos / magV);
                N = new THREE.Vector3(0, -cos, -sin);
            }

            const B = new THREE.Vector3().crossVectors(T, N).normalize();
            return { pos, T, N, B };
        }

        function updateEquationDisplay() {
            let eq = "";
            if (helixAxis === 'z') eq = `r(t) = <${R.toFixed(1)}cos(t), ${R.toFixed(1)}sin(t), ${P.toFixed(1)}t>`;
            if (helixAxis === 'y') eq = `r(t) = <${R.toFixed(1)}cos(t), ${P.toFixed(1)}t, ${R.toFixed(1)}sin(t)>`;
            if (helixAxis === 'x') eq = `r(t) = <${P.toFixed(1)}t, ${R.toFixed(1)}cos(t), ${R.toFixed(1)}sin(t)>`;
            document.getElementById('equation-display').innerText = eq;
        }

        function rebuildTrack() {
            while(trackGroup.children.length > 0) trackGroup.remove(trackGroup.children[0]); 

            const trackStyle = document.getElementById('select-track').value;
            const pointsCenter = [];
            const pointsRail1 = [];
            const pointsRail2 = [];
            const trackWidth = 0.6; 

            for (let t = 0; t <= maxT; t += 0.05) {
                const { pos, B } = getTNB(t);
                pointsCenter.push(pos.clone());
                const offset = B.clone().multiplyScalar(trackWidth / 2);
                pointsRail1.push(pos.clone().add(offset));
                pointsRail2.push(pos.clone().sub(offset));
            }

            if (trackStyle === 'rails') {
                trackGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pointsRail1), trackMaterial));
                trackGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pointsRail2), trackMaterial));
                const tiePoints = [];
                for (let i = 0; i < pointsRail1.length; i += 10) tiePoints.push(pointsRail1[i], pointsRail2[i]);
                trackGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(tiePoints), trackMaterial));
            } else if (trackStyle === 'line') {
                trackGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pointsCenter), trackMaterial));
            } else if (trackStyle === 'tube') {
                class HelixCurve extends THREE.Curve {
                    getPoint(t, optionalTarget = new THREE.Vector3()) {
                        const angle = t * maxT;
                        return optionalTarget.copy(getTNB(angle).pos);
                    }
                }
                trackGroup.add(new THREE.Mesh(new THREE.TubeGeometry(new HelixCurve(), 200, 0.2, 8, false), tubeMaterial));
            }

            const midPoint = getTNB(maxT / 2).pos;
            controls.target.copy(midPoint);
            controls.update();
        }

        let isPlaying = true;
        let speed = 0.03;

        document.getElementById('btn-play').addEventListener('click', (e) => {
            isPlaying = !isPlaying;
            e.target.innerText = isPlaying ? "Pause Simulation" : "Play Simulation";
        });
        document.getElementById('slider-speed').addEventListener('input', (e) => speed = parseFloat(e.target.value));
        document.getElementById('select-axis').addEventListener('change', (e) => {
            helixAxis = e.target.value; updateEquationDisplay(); rebuildTrack();
        });
        document.getElementById('slider-r').addEventListener('input', (e) => { R = parseFloat(e.target.value); updateEquationDisplay(); rebuildTrack(); });
        document.getElementById('slider-p').addEventListener('input', (e) => { P = parseFloat(e.target.value); updateEquationDisplay(); rebuildTrack(); });
        document.getElementById('select-track').addEventListener('change', rebuildTrack);
        
        document.getElementById('select-cart').addEventListener('change', (e) => {
            chassis.visible = false; cartSphere.visible = false; cartBox.visible = false;
            if(e.target.value === 'cart') chassis.visible = true;
            if(e.target.value === 'sphere') cartSphere.visible = true;
            if(e.target.value === 'box') cartBox.visible = true;
        });

        document.getElementById('color-bg').addEventListener('input', (e) => scene.background.set(e.target.value));
        document.getElementById('color-track').addEventListener('input', (e) => {
            trackMaterial.color.set(e.target.value); tubeMaterial.color.set(e.target.value);
        });
        document.getElementById('color-cart').addEventListener('input', (e) => {
            primaryCartMaterial.color.set(e.target.value);
            cartLight.color.set(e.target.value);
            trailMaterial.color.set(e.target.value);
            
            cartGroup.remove(glowSprite);
            let colorHex = e.target.value;
            let r = parseInt(colorHex.slice(1,3), 16), g = parseInt(colorHex.slice(3,5), 16), b = parseInt(colorHex.slice(5,7), 16);
            glowSpriteMat = createGlowMaterial(`rgba(${r}, ${g}, ${b}, 1)`);
            glowSprite.material = glowSpriteMat;
            cartGroup.add(glowSprite);
        });

        document.getElementById('check-t').addEventListener('change', (e) => { arrowT.visible = e.target.checked; spriteT.visible = e.target.checked; });
        document.getElementById('check-n').addEventListener('change', (e) => { arrowN.visible = e.target.checked; spriteN.visible = e.target.checked; });
        document.getElementById('check-b').addEventListener('change', (e) => { arrowB.visible = e.target.checked; spriteB.visible = e.target.checked; });

        updateEquationDisplay();
        rebuildTrack();

        let currentTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                currentTime += speed;
                if (currentTime > maxT) currentTime = 0; 
            }

            const { pos, T, N, B } = getTNB(currentTime);
            
            cartGroup.position.copy(pos);
            cartLight.position.copy(pos);

            const rotationMatrix = new THREE.Matrix4();
            rotationMatrix.makeBasis(T, N, B);
            cartGroup.quaternion.setFromRotationMatrix(rotationMatrix);

            arrowT.position.copy(pos); arrowN.position.copy(pos); arrowB.position.copy(pos);
            arrowT.setDirection(T); arrowN.setDirection(N); arrowB.setDirection(B);

            spriteT.position.copy(pos).add(T.clone().multiplyScalar(labelOffset));
            spriteN.position.copy(pos).add(N.clone().multiplyScalar(labelOffset));
            spriteB.position.copy(pos).add(B.clone().multiplyScalar(labelOffset));

            const trailPoints = [];
            const trailLength = 3.0; 
            const startT = Math.max(0, currentTime - trailLength);
            for (let t = startT; t <= currentTime; t += 0.05) {
                trailPoints.push(getTNB(t).pos);
            }
            trailPoints.push(pos.clone());
            trailLine.geometry.setFromPoints(trailPoints);

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        animate();
    </script>
</body>
</html>
